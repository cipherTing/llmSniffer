name: llmsniffer-prod

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      API_PORT: 3001
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:?ADMIN_BOOTSTRAP_TOKEN is required}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      REDIS_URL: redis://redis:6379
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:?PROBE_SECRET_KEY is required}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: scheduler
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:?PROBE_SECRET_KEY is required}
      SCHEDULER_TICK_MS: ${SCHEDULER_TICK_MS:-5000}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-probe-openai:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: probe-openai
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:?PROBE_SECRET_KEY is required}
      PROBE_TIMEOUT_MS: ${PROBE_TIMEOUT_MS:-30000}
      PROBE_JOB_LOCK_MS: ${PROBE_JOB_LOCK_MS:-60000}
      PROBE_WORKER_CONCURRENCY: ${PROBE_WORKER_CONCURRENCY:-10}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-probe-anthropic:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: probe-anthropic
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:?PROBE_SECRET_KEY is required}
      PROBE_TIMEOUT_MS: ${PROBE_TIMEOUT_MS:-30000}
      PROBE_JOB_LOCK_MS: ${PROBE_JOB_LOCK_MS:-60000}
      PROBE_WORKER_CONCURRENCY: ${PROBE_WORKER_CONCURRENCY:-10}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-probe-gemini:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: probe-gemini
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:?PROBE_SECRET_KEY is required}
      PROBE_TIMEOUT_MS: ${PROBE_TIMEOUT_MS:-30000}
      PROBE_JOB_LOCK_MS: ${PROBE_JOB_LOCK_MS:-60000}
      PROBE_WORKER_CONCURRENCY: ${PROBE_WORKER_CONCURRENCY:-10}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-metrics:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: metrics
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:?PROBE_SECRET_KEY is required}
      METRICS_WORKER_CONCURRENCY: ${METRICS_WORKER_CONCURRENCY:-5}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-snapshot:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: snapshot
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:?PROBE_SECRET_KEY is required}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongo:
    image: mongo:8
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-llmsniffer}
    volumes:
      - mongo-prod-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-prod-data:
  redis-prod-data:
