name: llmsniffer-dev

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-llmsniffer}
    volumes:
      - mongo-dev-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-scheduler:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: scheduler
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
      SCHEDULER_TICK_MS: ${SCHEDULER_TICK_MS:-5000}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-probe-openai:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: probe-openai
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
      PROBE_TIMEOUT_MS: ${PROBE_TIMEOUT_MS:-30000}
      PROBE_JOB_LOCK_MS: ${PROBE_JOB_LOCK_MS:-60000}
      PROBE_WORKER_CONCURRENCY: ${PROBE_WORKER_CONCURRENCY:-10}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-probe-anthropic:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: probe-anthropic
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
      PROBE_TIMEOUT_MS: ${PROBE_TIMEOUT_MS:-30000}
      PROBE_JOB_LOCK_MS: ${PROBE_JOB_LOCK_MS:-60000}
      PROBE_WORKER_CONCURRENCY: ${PROBE_WORKER_CONCURRENCY:-10}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-probe-gemini:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: probe-gemini
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
      PROBE_TIMEOUT_MS: ${PROBE_TIMEOUT_MS:-30000}
      PROBE_JOB_LOCK_MS: ${PROBE_JOB_LOCK_MS:-60000}
      PROBE_WORKER_CONCURRENCY: ${PROBE_WORKER_CONCURRENCY:-10}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-metrics:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: metrics
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
      METRICS_WORKER_CONCURRENCY: ${METRICS_WORKER_CONCURRENCY:-5}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-snapshot:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:worker:prod", "--workspace", "api"]
    environment:
      WORKER_ROLE: snapshot
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-llmsniffer}:${MONGO_INITDB_ROOT_PASSWORD:-llmsniffer_dev_password}@mongo:27017/${MONGO_DATABASE:-llmsniffer}?authSource=admin
      PROBE_SECRET_KEY: ${PROBE_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo-dev-data:
  redis-dev-data:
